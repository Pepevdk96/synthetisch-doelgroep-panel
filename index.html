// API helpers
async function callEdgeFunction(name, body) {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    },
    body: JSON.stringify(body),
  });
  return res.json();
}

async function transcribeAudio(file) {
  const formData = new FormData();
  formData.append("file", file);
  const res = await fetch(`${SUPABASE_URL}/functions/v1/panel-transcribe`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${SUPABASE_ANON_KEY}` },
    body: formData,
  });
  return res.json();
}

async function transcribeOmnyUrl(url) {
  return callEdgeFunction("panel-transcribe", { audio_url: url });
}

async function fetchFrameIO(urlOrId) {
  // Try as URL first, then as asset ID
  const body = urlOrId.includes("/") ? { url: urlOrId } : { asset_id: urlOrId };
  return callEdgeFunction("panel-frameio", body);
}

function parseTranscriptFile(text, filename) {
  // Strip SRT/VTT timestamps and metadata, return clean text
  const ext = filename?.split('.').pop()?.toLowerCase();
  let lines = text.split('\n');
  let clean = [];
  if (ext === 'vtt' || text.trimStart().startsWith('WEBVTT')) {
    // Skip WEBVTT header and NOTE blocks
    let inNote = false;
    for (let line of lines) {
      if (line.trim() === 'WEBVTT') continue;
      if (line.trim().startsWith('NOTE')) { inNote = true; continue; }
      if (inNote && line.trim() === '') { inNote = false; continue; }
      if (inNote) continue;
      // Skip timestamp lines
      if (/^\d{2}:\d{2}/.test(line.trim()) && line.includes('-->')) continue;
      // Skip empty lines and sequence numbers
      if (line.trim() === '' || /^\d+$/.test(line.trim())) continue;
      clean.push(line.trim());
    }
  } else {
    // SRT format
    for (let line of lines) {
      if (/^\d+$/.test(line.trim())) continue;
      if (/^\d{2}:\d{2}/.test(line.trim()) && line.includes('-->')) continue;
      if (line.trim() === '') continue;
      clean.push(line.trim());
    }
  }
  return clean.join(' ').replace(/\s+/g, ' ').trim();
}

  return (
    <div style={{
      borderLeft: `4px solid ${b.color}`, background: `${b.color}06`,
      borderRadius: 12, padding: 14, marginBottom: 10, animation: "fadeIn .5s ease",

      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>

            {[p.gender, p.age_bracket, p.location, p.education_level].filter(Boolean).join(" \u00b7 ")}
          </span>
        )}
        {score && (
          <span style={{
            fontSize: 12, fontWeight: 700, marginLeft: "auto",
            background: score >= 7 ? "#27ae60" : score >= 5 ? "#f39c12" : "#e74c3c",
            color: "#fff", padding: "2px 8px", borderRadius: 6,
          }}>{score}/10</span>
        )}
      </div>
      <p style={{ margin: "0 0 6px", fontSize: 12, color: "#333", lineHeight: 1.5 }}>{evaluation.review}</p>
      {evaluation.tags?.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 6 }}>
          {evaluation.tags.map((t, i) => (
            <span key={i} style={{

              background: t.positive ? "#27ae6010" : "#e74c3c10",
              color: t.positive ? "#27ae60" : "#e74c3c",

  const { avg_score, verdict, total_panelists, would_listen, would_share, successful_evaluations } = result;
  const vc = verdict === "go" ? "#27ae60" : verdict === "tweak" ? "#f39c12" : "#e74c3c";
  const vl = verdict === "go" ? "GO \ud83d\ude80" : verdict === "tweak" ? "TWEAK \ud83d\udd27" : "STOP \u270b";

  return (
    <div style={{ background: "#fff", borderRadius: 14, padding: 18, marginBottom: 14 }}>
      <h3 style={{ margin: "0 0 12px", fontSize: 15 }}>{"\ud83d\udcca"} Panel Verdict</h3>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
        {[
          { val: avg_score?.toFixed(1), label: "Gem. Score", color: vc },
          { val: `${would_listen}/${total_panelists}`, label: "Nog luisteren", color: "#3498db" },
          { val: `${would_share}/${total_panelists}`, label: "Zou delen", color: "#9b59b6" },
          { val: vl, label: "Advies", color: vc },
        ].map((m, i) => (
          <div key={i} style={{ textAlign: "center", padding: 12, background: "#f8f9fa", borderRadius: 10 }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: m.color }}>{m.val}</div>
            <div style={{ fontSize: 10, color: "#888" }}>{m.label}</div>
          </div>
        ))}
      </div>
      {result.evaluations && (
        <div style={{ marginTop: 14 }}>
          {result.evaluations.filter(e => e.score).map((e, i) => {
            const p = e.persona || {};
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: "1px solid #f0f0f0" }}>
                <span style={{ fontSize: 16 }}>{p.avatar}</span>
                <span style={{ fontSize: 11, fontWeight: 600, width: 90 }}>{p.name?.split(" ")[0]}</span>
                <div style={{ flex: 1, height: 6, background: "#f0f0f0", borderRadius: 3, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(e.score || 0) * 10}%`, background: e.score >= 7 ? "#27ae60" : e.score >= 5 ? "#f39c12" : "#e74c3c", borderRadius: 3, transition: "width 1s" }} />
                </div>
                <span style={{ fontSize: 12, fontWeight: 700, width: 30, textAlign: "right" }}>{e.score}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SegmentBar({ label, value, count, max = 10, color = "#E8A830" }) {
  const hasValue = value !== null && value !== undefined;
  const pct = hasValue ? (value / max) * 100 : 0;
  const barColor = !hasValue ? "#e0e0e0" : value >= 7 ? "#27ae60" : value >= 5 ? "#f39c12" : "#e74c3c";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0" }}>
      <span style={{ fontSize: 10, fontWeight: 600, width: 110, color: hasValue ? "#333" : "#aaa" }}>
        {label}{count != null && <span style={{ color: "#aaa", fontWeight: 400 }}> ({count})</span>}
      </span>
      <div style={{ flex: 1, height: 8, background: "#f0f0f0", borderRadius: 4, overflow: "hidden" }}>
        {hasValue && <div style={{ height: "100%", width: `${pct}%`, background: barColor, borderRadius: 4, transition: "width .8s" }} />}
      </div>
      <span style={{ fontSize: 11, fontWeight: 700, width: 32, textAlign: "right", color: hasValue ? "#333" : "#ccc" }}>
        {hasValue ? value.toFixed(1) : "\u2014"}
      </span>
    </div>
  );
}

function SegmentationReport({ result }) {
  if (!result?.evaluations || !result?.segments) return null;
  const evals = result.evaluations.filter(e => e.score);

  // Count personas per segment
  const count = (fn) => evals.filter(e => fn(e.persona || {})).length;

  const s = result.segments;

  // Only show groups that have at least one persona
  const genderRows = [
    { label: "Man", value: s.by_gender?.man, count: count(p => p.gender === "man") },
    { label: "Vrouw", value: s.by_gender?.vrouw, count: count(p => p.gender === "vrouw") },
    { label: "Non-binair", value: s.by_gender?.["non-binair"], count: count(p => p.gender === "non-binair") },
  ].filter(r => r.count > 0);

  const regionRows = [
    { label: "Randstad", value: s.by_region?.randstad, count: count(p => p.is_randstad === true) },
    { label: "Buiten Randstad", value: s.by_region?.buiten_randstad, count: count(p => p.is_randstad === false) },
  ].filter(r => r.count > 0);

  const ageRows = [
    { label: "18\u201324", value: s.by_age?.["18-24"], count: count(p => p.age_bracket === "18-24") },
    { label: "25\u201334", value: s.by_age?.["25-34"], count: count(p => p.age_bracket === "25-34") },
    { label: "35\u201344", value: s.by_age?.["35-44"], count: count(p => p.age_bracket === "35-44") },
    { label: "45\u201354", value: s.by_age?.["45-54"], count: count(p => p.age_bracket === "45-54") },
    { label: "55\u201364", value: s.by_age?.["55-64"], count: count(p => p.age_bracket === "55-64") },
    { label: "65+", value: s.by_age?.["65+"], count: count(p => p.age_bracket === "65+") },
  ].filter(r => r.count > 0);

  const eduRows = [
    { label: "WO", value: s.by_education?.WO, count: count(p => p.education_level === "WO") },
    { label: "HBO", value: s.by_education?.HBO, count: count(p => p.education_level === "HBO") },
    { label: "MBO", value: s.by_education?.MBO, count: count(p => p.education_level === "MBO") },
    { label: "VMBO", value: s.by_education?.VMBO, count: count(p => p.education_level === "VMBO") },
  ].filter(r => r.count > 0);

  const brandRows = [
    { label: "Tonny", value: s.by_brand?.tonny, count: count(p => p.brand === "tonny") },
    { label: "Podimo", value: s.by_brand?.podimo, count: count(p => p.brand === "podimo") },
    { label: "Dag & Nacht", value: s.by_brand?.dagnacht, count: count(p => p.brand === "dagnacht") },
  ].filter(r => r.count > 0);

  const Section = ({ title, icon, rows }) => rows.length === 0 ? null : (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#1a1045", marginBottom: 4 }}>{icon} {title}</div>
      {rows.map((r, i) => <SegmentBar key={i} label={r.label} value={r.value} count={r.count} />)}
    </div>
  );

  // Find biggest gap to surface as insight
  const allRows = [
    ...genderRows.map(r => ({ ...r, group: "geslacht" })),
    ...regionRows.map(r => ({ ...r, group: "regio" })),
    ...ageRows.map(r => ({ ...r, group: "leeftijd" })),
    ...eduRows.map(r => ({ ...r, group: "opleiding" })),
  ].filter(r => r.value != null);

  let insight = null;
  if (allRows.length >= 2) {
    const sorted = [...allRows].sort((a, b) => b.value - a.value);
    const top = sorted[0];
    const bot = sorted[sorted.length - 1];
    const gap = top.value - bot.value;
    if (gap >= 1.5) {
      insight = `Grootste verschil: ${top.label} scoort ${top.value.toFixed(1)} vs ${bot.label} ${bot.value.toFixed(1)} (\u0394 ${gap.toFixed(1)}). Dit format resoneert sterker bij ${top.label.toLowerCase()} dan bij ${bot.label.toLowerCase()}.`;
    }
  }

  return (
    <div style={{ background: "#fff", borderRadius: 14, padding: 16, marginBottom: 14 }}>
      <h3 style={{ margin: "0 0 10px", fontSize: 14 }}>{"\ud83d\udccd"} Demografische Doorsnede</h3>
      {insight && (
        <div style={{ background: "#E8A83010", border: "1px solid #E8A83030", borderRadius: 8, padding: "8px 10px", marginBottom: 12, fontSize: 11, color: "#333", lineHeight: 1.4 }}>
          <strong style={{ color: "#E8A830" }}>{"\ud83d\udca1"} Insight:</strong> {insight}
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div>
          <Section title="Geslacht" icon="\ud83d\udc64" rows={genderRows} />
          <Section title="Regio" icon="\ud83d\uddfa\ufe0f" rows={regionRows} />
          <Section title="Merk-affiniteit" icon="\ud83c\udff7\ufe0f" rows={brandRows} />
        </div>
        <div>
          <Section title="Leeftijd" icon="\ud83c\udf82" rows={ageRows} />
          <Section title="Opleiding" icon="\ud83c\udf93" rows={eduRows} />
        </div>
      </div>
      <p style={{ fontSize: 10, color: "#aaa", margin: "8px 0 0", fontStyle: "italic" }}>
        Gemiddelde scores per demografisch segment. Getallen tussen haakjes = aantal personas in dat segment.
      </p>
    </div>
  );
}

function ChatArea({ sessionId, messages, onSend, isLoading }) {
  const [input, setInput] = useState("");
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const quickQs = [
    "Wat vinden jullie van de doelgroep?",
    "Hoe sterk is het format?",
    "Wie is de concurrent?",
    "Wat is de commerci\u00eble waarde?",
    "Hoe belangrijk is video?",
    "Wat zouden jullie veranderen?",
    "Past dit bij Podimo exclusive?",
    "Zou dit op TV kunnen werken?",
  ];

  const send = () => { if (input.trim()) { onSend(input); setInput(""); } };

  return (
    <div style={{ background: "#fff", borderRadius: 14, overflow: "hidden", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "10px 14px", borderBottom: "1px solid #f0f0f0", display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 16 }}>{"\ud83d\udcac"}</span>
        <strong style={{ fontSize: 13 }}>Chat met het Panel</strong>
        {sessionId && <span style={{ fontSize: 10, color: "#aaa", marginLeft: "auto" }}>Sessie actief</span>}
      </div>

      <div style={{ flex: 1, padding: 14, minHeight: 300, maxHeight: 450, overflowY: "auto" }}>
        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 16px", color: "#ccc" }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>{"\ud83c\udfa4"}</div>
            <p style={{ fontSize: 12, maxWidth: 300, margin: "0 auto" }}>Voer eerst een concept in en laat het panel analyseren. Daarna kun je hier doorpraten.</p>
          </div>
        )}
        {messages.map((msg, i) => {
          const isUser = msg.role === "user";
          const isSystem = msg.role === "system";
          const b = msg.brand ? BRANDS[msg.brand] : null;
          if (isSystem) return (
            <div key={i} style={{ textAlign: "center", padding: "6px 0" }}>
              <span style={{ fontSize: 11, color: "#999", background: "#f5f5f5", padding: "3px 10px", borderRadius: 6 }}>{msg.content}</span>
            </div>
          );
          return (
            <div key={i} style={{ display: "flex", gap: 8, marginBottom: 10, flexDirection: isUser ? "row-reverse" : "row", animation: "fadeIn .3s" }}>
              {!isUser && <div style={{ width: 30, height: 30, borderRadius: "50%", background: b ? `${b.color}20` : "#f0f0f0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{msg.avatar || "\ud83e\udde0"}</div>}
              <div style={{
                maxWidth: "72%", padding: "8px 12px", borderRadius: 12,
                background: isUser ? "#E8A830" : "#f0f2f5",
                color: isUser ? "#fff" : "#1a1a2e",
                borderTopRightRadius: isUser ? 4 : 12, borderTopLeftRadius: isUser ? 12 : 4,
              }}>
                {!isUser && msg.personaName && <div style={{ fontSize: 10, fontWeight: 700, color: b?.color || "#666", marginBottom: 2 }}>{msg.personaName}</div>}
                <p style={{ margin: 0, fontSize: 12, lineHeight: 1.5 }}>{msg.content}</p>
              </div>
            </div>
          );
        })}
        {isLoading && <div style={{ textAlign: "center", padding: 12 }}><span style={{ fontSize: 18, animation: "pulse 1s infinite" }}>{"\ud83d\udcad"}</span></div>}
        <div ref={endRef} />
      </div>

      {sessionId && (
        <>
          <div style={{ padding: "4px 12px", borderTop: "1px solid #f5f5f5", display: "flex", flexWrap: "wrap", gap: 3 }}>
            {quickQs.map((q, i) => (
              <button key={i} onClick={() => { setInput(q); }} style={{
                padding: "3px 8px", borderRadius: 12, border: "1px solid #E8A83030", background: "#E8A83005",
                color: "#E8A830", fontSize: 10, cursor: "pointer", fontWeight: 500,
              }}>{q}</button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 6, padding: "10px 12px", borderTop: "1px solid #f0f0f0" }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && send()}
              placeholder="Stel een vraag aan het panel..." style={{ flex: 1, padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e0e0e0", fontSize: 12 }} />
            <button onClick={send} disabled={!input.trim() || isLoading} style={{
              padding: "9px 18px", borderRadius: 8, border: "none",
              background: input.trim() && !isLoading ? "#E8A830" : "#ccc",
              color: "#fff", fontWeight: 700, cursor: input.trim() && !isLoading ? "pointer" : "default", fontSize: 12,
            }}>Verstuur</button>
          </div>
        </>
      )}
    </div>
  );
}

// ============================================
// Main App
// ============================================
function PanelApp() {
  const [tab, setTab] = useState("test");
  const [pipelineStep, setPipelineStep] = useState(0);
  const [personas, setPersonas] = useState([]);
  const [selectedPersonas, setSelectedPersonas] = useState([]);
  const [briefing, setBriefing] = useState({});
  const [inputType, setInputType] = useState("concept");
  const [audioFile, setAudioFile] = useState(null);
  const [omnyUrl, setOmnyUrl] = useState("");
  const [transcriptFile, setTranscriptFile] = useState(null);
  const [transcriptText, setTranscriptText] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [isChatLoading, setIsChatLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [sessionId, setSessionId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [expandedEvals, setExpandedEvals] = useState({});
  const [error, setError] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [crossBrand, setCrossBrand] = useState(false);

  useEffect(() => {
    // Load personas (with fallback to embedded data)
    fetch(`${SUPABASE_URL}/rest/v1/personas?select=*&is_active=eq.true`, {
      headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Accept-Profile": "panel" },
    }).then(r => r.json()).then(data => {
      if (Array.isArray(data) && data.length > 0) { setPersonas(data); setSelectedPersonas(data.map(p => p.id)); }
      else { setPersonas(FALLBACK_PERSONAS); setSelectedPersonas(FALLBACK_PERSONAS.map(p => p.id)); }
    }).catch(() => {
      // Fallback: use embedded personas
      setPersonas(FALLBACK_PERSONAS);
      setSelectedPersonas(FALLBACK_PERSONAS.map(p => p.id));
    });

    // Load recent sessions
    fetch(`${SUPABASE_URL}/rest/v1/sessions?select=*&order=created_at.desc&limit=10`, {
      headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Accept-Profile": "panel" },
    }).then(r => r.json()).then(data => { if (Array.isArray(data)) setSessions(data); }).catch(() => {});
  }, []);

  const togglePersona = (id) => setSelectedPersonas(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const startAnalysis = async () => {
    setIsLoading(true); setError(null); setResult(null); setMessages([]); setPipelineStep(1);
    try {
      let transcription = null;
      if (inputType === "transcript" && transcriptText) {
        setMessages([{ role: "system", content: `\ud83d\udcc4 Transcriptie geladen vanuit ${transcriptFile?.name || 'tekst'} (${transcriptText.length} tekens)` }]);
        transcription = transcriptText;
      } else if (inputType === "frameio" && omnyUrl) {
        setMessages([{ role: "system", content: `\ud83c\udfac Frame.io asset ophalen...` }]);
        const fioResult = await fetchFrameIO(omnyUrl);
        if (fioResult.error) throw new Error(`Frame.io fout: ${fioResult.error}`);
        if (fioResult.has_transcription && fioResult.transcription) {
          transcription = fioResult.transcription;
          setMessages(prev => [...prev, { role: "system", content: `\u2705 Transcriptie opgehaald uit Frame.io: "${fioResult.asset?.name}" (${Math.round(fioResult.asset?.duration || 0)}s)` }]);
        } else if (fioResult.asset?.download_url) {
          // No transcription in Frame.io, fall back to Whisper
          setMessages(prev => [...prev, { role: "system", content: `\ud83c\udfa4 Geen transcriptie in Frame.io, audio transcriberen via Whisper...` }]);
          const txResult = await callEdgeFunction("panel-transcribe", { audio_url: fioResult.asset.download_url });
          if (txResult.error) throw new Error(`Whisper transcriptie mislukt: ${txResult.error}`);
          transcription = txResult.text;
          setMessages(prev => [...prev, { role: "system", content: `\u2705 Whisper transcriptie voltooid (${Math.round(txResult.duration || 0)}s)` }]);
        } else {
          setMessages(prev => [...prev, { role: "system", content: `\u26a0\ufe0f Asset gevonden maar geen transcriptie of download beschikbaar. Analyse gaat door op basis van concept-info.` }]);
        }
      } else if (inputType === "audio" && audioFile) {
        setMessages([{ role: "system", content: `\ud83c\udfa4 Transcriberen van "${audioFile.name}"...` }]);
        const txResult = await transcribeAudio(audioFile);
        if (txResult.error) throw new Error(`Transcriptie mislukt: ${txResult.error}`);
        transcription = txResult.text;
        setMessages(prev => [...prev, { role: "system", content: `\u2705 Transcriptie voltooid (${Math.round(txResult.duration || 0)}s audio)` }]);
      }

      setPipelineStep(2);
      setMessages(prev => [...prev, { role: "system", content: "\ud83e\udde0 Panel analyseert het concept..." }]);
      const concept = { ...briefing };
      if (concept.doc_url) {
        concept.references = (concept.references || '') + '\nBijlage: ' + concept.doc_url;
      }
      if (transcription) concept.transcription = transcription;

      const analysisResult = await callEdgeFunction("panel-analyze", {
        concept,
        persona_ids: selectedPersonas.length < personas.length ? selectedPersonas : undefined,
        cross_brand: crossBrand,
      });
      if (analysisResult.error) throw new Error(analysisResult.error);

      setPipelineStep(3); setResult(analysisResult); setSessionId(analysisResult.session_id);

      const newMessages = [
        { role: "system", content: `\u2705 Panel analyse voltooid \u2014 ${analysisResult.verdict?.toUpperCase()} (${analysisResult.avg_score?.toFixed(1)}/10)` },
      ];
      analysisResult.evaluations?.forEach(e => {
        const p = e.persona || {};
        if (e.review && !e.review.startsWith("Anthropic API error")) {
          newMessages.push({ role: "persona", personaName: p.name, avatar: p.avatar, brand: p.brand, content: e.review });
        }
      });
      newMessages.push({ role: "system", content: "\ud83d\udcac Stel nu vragen aan het panel!" });
      setMessages(prev => [...prev, ...newMessages]);
    } catch (err) {
      setError(err.message);
      setMessages(prev => [...prev, { role: "system", content: `\u274c Fout: ${err.message}` }]);
    } finally { setIsLoading(false); }
  };

  const sendChat = async (msg) => {
    if (!sessionId) return;
    setMessages(prev => [...prev, { role: "user", content: msg }]);
    setIsChatLoading(true);
    try {
      const chatResult = await callEdgeFunction("panel-chat", { session_id: sessionId, message: msg });
      if (chatResult.error) throw new Error(chatResult.error);
      const newMsgs = chatResult.responses?.map(r => ({
        role: "persona", personaName: r.persona_name, brand: r.persona_brand,
        avatar: personas.find(p => p.id === r.persona_id)?.avatar || "\ud83e\udde0",
        content: r.content,
      })) || [];
      setMessages(prev => [...prev, ...newMsgs]);
    } catch (err) {
      setMessages(prev => [...prev, { role: "system", content: `\u274c ${err.message}` }]);
    } finally { setIsChatLoading(false); }
  };

  return (
    <div style={{ minHeight: "100vh", background: "#f5f5f7", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      <div style={{ background: "linear-gradient(135deg,#1a1045,#2d1b69)", padding: "14px 24px", color: "#fff" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 20, fontWeight: 800 }}>{"\ud83e\udd5c"} Synthetisch Doelgroep Panel</h1>
            <p style={{ margin: "1px 0 0", fontSize: 10, opacity: .5 }}>Tonny {"\u00b7"} Podimo {"\u00b7"} Dag & Nacht {"\u2014"} Powered by Claude + Whisper + Supabase</p>
          </div>
          <div style={{ display: "flex", gap: 3 }}>
            {[{ id: "test", l: "\ud83c\udfa4 Test" }, { id: "history", l: "\ud83d\udcda Sessies" }].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                padding: "6px 12px", borderRadius: 8, border: "none",
                background: tab === t.id ? "#E8A830" : "rgba(255,255,255,.1)",
                color: tab === t.id ? "#1a1045" : "#fff", fontWeight: 600, cursor: "pointer", fontSize: 11,
              }}>{t.l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "14px 24px" }}>
        {tab === "test" && (
          <>
            <Pipeline step={pipelineStep} />
            {error && (
              <div style={{ background: "#fee", border: "1px solid #fcc", borderRadius: 10, padding: 12, marginBottom: 14, fontSize: 12, color: "#c33" }}>
                <strong>Fout:</strong> {error}
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 14 }}>
              <div style={{ maxHeight: "calc(100vh - 160px)", overflowY: "auto" }}>
                <PersonaGrid personas={personas} selected={selectedPersonas} onToggle={togglePersona} crossBrand={crossBrand} setCrossBrand={setCrossBrand} />
                <BriefingForm briefing={briefing} onChange={(k, v) => setBriefing(prev => ({ ...prev, [k]: v }))}
                  onSubmit={startAnalysis} inputType={inputType} setInputType={setInputType}
                  audioFile={audioFile} setAudioFile={setAudioFile} omnyUrl={omnyUrl} setOmnyUrl={setOmnyUrl}
                  transcriptFile={transcriptFile} setTranscriptFile={setTranscriptFile}
                  transcriptText={transcriptText} setTranscriptText={setTranscriptText} isLoading={isLoading} />
              </div>
              <div>
                <Dashboard result={result} />
                <SegmentationReport result={result} />
                {result?.evaluations && (
                  <div style={{ background: "#fff", borderRadius: 14, padding: 16, marginBottom: 14 }}>
                    <h3 style={{ margin: "0 0 10px", fontSize: 14 }}>{"\ud83d\udde3\ufe0f"} Individuele Evaluaties</h3>
                    {result.evaluations.filter(e => e.score).map((e, i) => (
                      <EvalCard key={i} evaluation={e} expanded={expandedEvals[i]} onToggle={() => setExpandedEvals(prev => ({ ...prev, [i]: !prev[i] }))} />
                    ))}
                  </div>
                )}
                <ChatArea sessionId={sessionId} messages={messages} onSend={sendChat} isLoading={isChatLoading} />
              </div>
            </div>
          </>
        )}

        {tab === "history" && (
          <div style={{ background: "#fff", borderRadius: 14, padding: 20 }}>
            <h2 style={{ margin: "0 0 14px", fontSize: 18 }}>{"\ud83d\udcda"} Eerdere Sessies</h2>
            {sessions.length === 0 && <p style={{ color: "#999", fontSize: 13 }}>Nog geen sessies. Start je eerste panel test!</p>}
            {sessions.map((s, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: "1px solid #f0f0f0" }}>
                <div style={{
                  width: 40, height: 40, borderRadius: 10,
                  background: s.panel_verdict === "go" ? "#27ae6015" : s.panel_verdict === "tweak" ? "#f39c1215" : "#e74c3c15",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18,
                }}>
                  {s.panel_verdict === "go" ? "\ud83d\ude80" : s.panel_verdict === "tweak" ? "\ud83d\udd27" : s.panel_verdict === "stop" ? "\u270b" : "\u23f3"}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{s.title || "Untitled"}</div>
                  <div style={{ fontSize: 11, color: "#888" }}>
                    {new Date(s.created_at).toLocaleDateString("nl-NL", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}
                    {s.target_brand && ` \u00b7 ${s.target_brand}`}
                    {s.input_type && ` \u00b7 ${s.input_type}`}
                  </div>
                </div>
                {s.avg_score > 0 && (
                  <div style={{
                    fontSize: 18, fontWeight: 800,
                    color: s.avg_score >= 7 ? "#27ae60" : s.avg_score >= 5 ? "#f39c12" : "#e74c3c",
                  }}>{Number(s.avg_score).toFixed(1)}</div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<PanelApp />, document.getElementById("root"));
</script>
</body>
</html>
