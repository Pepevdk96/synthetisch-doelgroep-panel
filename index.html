<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthetisch Doelgroep Panel — Tonny Media</title>
<style>
  body{font-family:-apple-system,sans-serif;background:#f5f5f7;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .loader{text-align:center}
  .spinner{width:40px;height:40px;border:4px solid #e8e8e8;border-top-color:#E8A830;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error{color:#e74c3c;background:#ffeaea;padding:16px;border-radius:8px;max-width:400px}
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="spinner"></div>
  <p style="color:#888;font-size:14px">Panel laden...</p>
</div>
<script>
var SB="https://jzrxawfuaduzvzcgnkez.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6cnhhd2Z1YWR1enZ6Y2dua2V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjIzMjQsImV4cCI6MjA5MDg5ODMyNH0.IpxbqaS3Uj64M5s2VToTxSdZGrGIAbhIrssy-mmRk6o";
fetch(SB+"/rest/v1/static_files?slug=eq.panel-app&select=content",{
  headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Accept-Profile":"panel"}
})
.then(function(r){return r.json()})
.then(function(d){
  if(d&&d[0]&&d[0].content){document.open();document.write(d[0].content);document.close()}
  else{document.getElementById("loader").innerHTML='<div class="error">Panel niet gevonden. Debug: '+JSON.stringify(d).substring(0,200)+'</div>'}
})
.catch(function(e){
  document.getElementById("loader").innerHTML='<div class="error">Fout: '+e.message+'</div>'
});
</script>
</body>
</html>
